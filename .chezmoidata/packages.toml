# SINGLE SOURCE OF TRUTH. Edit -> `chezmoi apply`. Idempotent.
# Auto-loaded into template data as .scoop / .winget / .startup

[scoop]
buckets = [
  { name = "extras" },
]
apps = [
  "main/chezmoi",
  "extras/age",                # secret encrypt/decrypt for chezmoi (key at ~/.config/chezmoi/key.txt)
  "extras/copyq",
  "extras/everything",
  "extras/caffeine",           # keep-awake (startup entry below)
  "extras/notepadplusplus",    # text editor
  "main/tectonic",             # LaTeX engine (was loose binary on Desktop)
  "extras/tex-fmt",            # LaTeX formatter (was loose binary on Desktop)
  "extras/sumatrapdf",         # PDF viewer for latex-workshop synctex
  "extras/handy",              # local speech-to-text (startup entry below; settings age-encrypted)
  # Textify: scoop Textify-Portable ships only setup.exe (no runnable exe) — installed via winget instead.
  # "main/pwsh", "main/git", "main/ripgrep", "extras/vscode", ...
]

# Per-machine extras: installed ONLY on the matching hostname (chezmoi .chezmoi.hostname).
# Shared apps above install everywhere; these add to them per box.
[scoop.byHost]
"iwes-id88" = [
  # work laptop extras, e.g. "extras/vscode"
]
# "home-pc" = [ "extras/obsidian" ]

[winget]
# winget often needs admin; keep empty unless a pkg is unavailable in scoop.
# assertExe (path under $HOME): after install, script verifies it exists and
# ERRORS if missing — turns a silent failed install into a loud failure.
apps = [
  { id = "rammichael.Textify", assertExe = 'AppData\Local\Programs\Textify\Textify.exe' },
]

# Run-at-login entries (HKCU Run key, no admin). exe = path under $HOME, literal backslashes.
# Removing an entry here DOES delete its old Run key on next apply (startup script reconciles
# against a managed-name marker at HKCU:\Software\chezmoi\ManagedStartup).
[[startup]]
name = "CopyQ"
exe  = 'scoop\apps\copyq\current\copyq.exe'
args = ""

[[startup]]
name = "Everything"
exe  = 'scoop\apps\everything\current\Everything.exe'
args = "-startup"

[[startup]]
name = "Caffeine"
exe  = 'scoop\apps\caffeine\current\caffeine64.exe'
args = ""

# Handy also self-registers autostart (settings_store.json autostart_enabled=true);
# this entry guarantees the Run key on a fresh machine before Handy's first launch.
# Same key name + scoop exe path, so the two agree. start_hidden=true → tray, no args.
[[startup]]
name = "Handy"
exe  = 'scoop\apps\handy\current\handy.exe'
args = ""

# Textify installed via winget (rammichael.Textify) → AppData\Local\Programs\Textify.
# Skipped on machines where it isn't present (Test-Path guard in the startup script).
[[startup]]
name = "Textify"
exe  = 'AppData\Local\Programs\Textify\Textify.exe'
args = "-hidewnd"
