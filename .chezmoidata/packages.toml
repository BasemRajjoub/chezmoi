# SINGLE SOURCE OF TRUTH. Edit -> `chezmoi apply`. Idempotent.
# Auto-loaded into template data as .scoop / .winget / .startup

[scoop]
buckets = [
  { name = "extras" },
]
apps = [
  "main/chezmoi",
  "extras/copyq",
  "extras/everything",
  "extras/caffeine",           # keep-awake (startup entry below)
  "extras/notepadplusplus",    # text editor
  "main/tectonic",             # LaTeX engine (was loose binary on Desktop)
  "extras/tex-fmt",            # LaTeX formatter (was loose binary on Desktop)
  "extras/sumatrapdf",         # PDF viewer for latex-workshop synctex
  "extras/handy",              # local speech-to-text (startup entry below)
  "main/uv",                   # fast Python package/venv manager
  "main/pixi",                 # conda-based package/workflow manager
  "extras/irfanview",          # image viewer (full manifest = bundles plugins pack)
  "extras/jabref",             # BibTeX/bibliography manager
  "extras/mpv",                # lightweight video player
  "extras/vlc",                # media player (default for video/audio, see [[defaults]])
  # Power tools
  "main/pwsh",                 # PowerShell 7 (modern, cross-platform)
  "main/git",                  # version control
  "main/ripgrep",              # fast grep tool for CLI/editors
  "extras/7zip",               # compression utility
  "main/jq",                   # JSON processor
  "main/claude-code",          # Claude Code CLI
  "main/gh",                   # GitHub CLI
  "extras/spacesniffer",       # disk space analyzer (visual treemap)
  "extras/vscode",             # code editor (settings managed via dotfiles)
  "extras/brave",              # privacy-focused browser (config managed via dotfiles)
  # PowerToys: scoop/winget both require admin or complex MSI extraction; use existing install.
  # Textify: scoop Textify-Portable ships only setup.exe (no runnable exe) — installed via winget instead.
]

# Per-machine extras: installed ONLY on the matching hostname (chezmoi .chezmoi.hostname).
# Shared apps above install everywhere; these add to them per box.
[scoop.byHost]
"iwes-id88" = [
  # work laptop extras, e.g. "extras/vscode"
]
# "home-pc" = [ "extras/obsidian" ]

[winget]
# winget often needs admin; keep empty unless a pkg is unavailable in scoop.
# assertExe (path under $HOME): after install, script verifies it exists and
# ERRORS if missing — turns a silent failed install into a loud failure.
apps = [
  { id = "rammichael.Textify", assertExe = 'AppData\Local\Programs\Textify\Textify.exe' },
  # Common native-app runtime prereqs, installed just in case — cheap, idempotent
  # (winget skips if already present), all system-wide so prompt UAC once each.
  # No assertExe on any of these: they land in WinSxS/System32/Program Files
  # with no single stable exe path to check.
  { id = "Microsoft.VCRedist.2015+.x64" },   # MSVCP140.dll/VCRUNTIME140.dll — needed by Handy, most native/Tauri apps
  { id = "Microsoft.VCRedist.2015+.x86" },   # same, for any 32-bit binaries
  { id = "Microsoft.DotNet.DesktopRuntime.8" }, # WinForms/WPF apps (LTS)
  { id = "Microsoft.EdgeWebView2Runtime" },  # Tauri/Electron-hybrid UIs (Handy, etc.) — usually preinstalled on Win11, not guaranteed on Win10
]

# Run-at-login entries (HKCU Run key, no admin). exe = path under $HOME, literal backslashes.
# Removing an entry here DOES delete its old Run key on next apply (startup script reconciles
# against a managed-name marker at HKCU:\Software\chezmoi\ManagedStartup).
[[startup]]
name = "CopyQ"
exe  = 'scoop\apps\copyq\current\copyq.exe'
args = ""

[[startup]]
name = "Everything"
exe  = 'scoop\apps\everything\current\Everything.exe'
args = "-startup"

[[startup]]
name = "Caffeine"
exe  = 'scoop\apps\caffeine\current\caffeine64.exe'
args = ""

# Handy also self-registers autostart (settings_store.json autostart_enabled=true);
# this entry guarantees the Run key on a fresh machine before Handy's first launch.
# Same key name + scoop exe path, so the two agree. start_hidden=true → tray, no args.
[[startup]]
name = "Handy"
exe  = 'scoop\apps\handy\current\handy.exe'
args = ""

# Textify installed via winget (rammichael.Textify) → AppData\Local\Programs\Textify.
# Skipped on machines where it isn't present (Test-Path guard in the startup script).
[[startup]]
name = "Textify"
exe  = 'AppData\Local\Programs\Textify\Textify.exe'
args = "-hidewnd"

[[startup]]
name = "PowerToys"
exe  = 'AppData\Local\PowerToys\PowerToys.exe'
args = ""

# Default file-type associations, set per-user (no admin) via the UserChoice hash
# in run_onchange_after_30-default-apps.ps1.tmpl. Extension lists adapted from
# github.com/Mobasheera/fix-windows-default-apps (which used the SetUserFTA tool);
# we compute the hash in pure PowerShell instead — no external binary.
#   name   = label for logging
#   exe    = handler path under $HOME (backslashes); whole entry skipped if missing
#   progid = ProgId registered to the exe ('Applications\<exe-leaf>' for portable apps)
#   exts   = extensions (incl. dot, lowercase) to point at this app
# No auto-reconcile: removing an ext/entry does NOT revert it — delete its HKCU
# UserChoice key manually (or reassign to another app here).
[[defaults]]
name   = "VLC"
exe    = 'scoop\apps\vlc\current\vlc.exe'
progid = 'Applications\vlc.exe'
exts   = [
  # video
  ".3gp", ".3g2", ".asf", ".avi", ".divx", ".flv", ".m2ts", ".m4v", ".mkv",
  ".mov", ".mp4", ".mpeg", ".mpg", ".mts", ".ogm", ".ogv", ".rm", ".rmvb",
  ".ts", ".vob", ".webm", ".wmv",
  # audio
  ".aac", ".ac3", ".aiff", ".ape", ".au", ".dts", ".flac", ".m4a", ".mid",
  ".midi", ".mp3", ".oga", ".ogg", ".opus", ".ra", ".wav", ".wma", ".wv",
  ".xm", ".mod", ".it", ".s3m",
]

[[defaults]]
name   = "SumatraPDF"
exe    = 'scoop\apps\sumatrapdf\current\SumatraPDF.exe'
progid = 'Applications\SumatraPDF.exe'
exts   = [
  ".pdf", ".xps", ".oxps", ".epub", ".mobi", ".fb2", ".djvu", ".chm",
  ".cbz", ".cbr", ".cbt", ".cb7",
]

[[defaults]]
name   = "IrfanView"
exe    = 'scoop\apps\irfanview\current\i_view64.exe'
progid = 'Applications\i_view64.exe'
exts   = [
  ".ani", ".b3d", ".bmp", ".dib", ".clp", ".crw", ".cr2", ".cr3", ".cur",
  ".dcm", ".acr", ".ima", ".dds", ".ecw", ".fmf", ".exr", ".g3", ".gif",
  ".hdp", ".jxr", ".wdp", ".heic", ".ico", ".iff", ".lbm", ".jls", ".jp2",
  ".jpc", ".j2k", ".jpf", ".jpg", ".jpeg", ".jfif", ".jpe", ".jpm", ".jxl",
  ".mng", ".jng", ".pbm", ".pcd", ".pcx", ".dcx", ".pgm", ".png", ".ppm",
  ".psd", ".psb", ".psp", ".qoi", ".ras", ".sun", ".raw", ".rle", ".sff",
  ".sgi", ".rgb", ".sid", ".tga", ".tif", ".tiff", ".wbmp", ".webp", ".wmf",
  ".xbm", ".xpm",
]
